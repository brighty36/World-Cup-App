name: Update results

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/update-results.mjs
      - name: Commit and push if changed
        run: |
          if git diff --quiet -- src/data/results.json; then
            echo "No changes to results.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/results.json
          git commit -m "Update match results"
          git push
